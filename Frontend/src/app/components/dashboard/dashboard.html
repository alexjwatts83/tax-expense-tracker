<section class="page">
	<h1>Dashboard</h1>

	@if (errorMessage) {
		<p class="error-message">{{ errorMessage }}</p>
	}

	@if (isLoading) {
		<div class="loading">
			<mat-spinner diameter="32"></mat-spinner>
		</div>
	} @else {
	<div class="cards">
		<mat-card>
			<mat-card-title>Total Spent</mat-card-title>
			<mat-card-content>{{ summary?.totalSpent ?? 0 | currency }}</mat-card-content>
		</mat-card>
		<mat-card>
			<mat-card-title>Top Tracker</mat-card-title>
			<mat-card-content>{{ topTracker }}</mat-card-content>
		</mat-card>
		<mat-card>
			<mat-card-title>Top Bank</mat-card-title>
			<mat-card-content>{{ topBank }}</mat-card-content>
		</mat-card>
	</div>
	}
</section>

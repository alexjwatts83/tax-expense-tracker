<section class="page">
	<mat-card class="tag-form-card">
		<mat-card-content>
			<form [formGroup]="tagForm" (ngSubmit)="createTag()" class="tag-form">
				<mat-form-field appearance="outline">
					<mat-label>Name</mat-label>
					<input matInput formControlName="name" placeholder="Deductible" />
				</mat-form-field>

				<div class="form-actions">
					<button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">
						{{ isSubmitting ? 'Saving...' : 'Add Tag' }}
					</button>
				</div>
			</form>
		</mat-card-content>
	</mat-card>

	@if (errorMessage) {
		<p class="error-message">{{ errorMessage }}</p>
	}

	@if (infoMessage) {
		<p class="info-message">
			{{ infoMessage }}
			@if (lastDeletedTag) {
				<button mat-button type="button" (click)="undoDeleteTag()">Undo</button>
			}
		</p>
	}

	<mat-card class="tag-list-card">
		<mat-card-content>
			@if (isLoading) {
				<div class="loading">
					<mat-spinner diameter="32"></mat-spinner>
				</div>
			} @else if (tags.length === 0) {
				<p>No tags yet.</p>
			} @else {
				<table mat-table [dataSource]="tags" class="tag-table">
					<ng-container matColumnDef="name">
						<th mat-header-cell *matHeaderCellDef>Name</th>
						<td mat-cell *matCellDef="let tag">{{ tag.name }}</td>
					</ng-container>

					<ng-container matColumnDef="createdAt">
						<th mat-header-cell *matHeaderCellDef>Created</th>
						<td mat-cell *matCellDef="let tag">{{ tag.createdAt | date: 'mediumDate' }}</td>
					</ng-container>

					<ng-container matColumnDef="actions">
						<th mat-header-cell *matHeaderCellDef>Actions</th>
						<td mat-cell *matCellDef="let tag">
							<button mat-icon-button color="warn" (click)="softDeleteTag(tag.id)" aria-label="Delete tag">
								<mat-icon>delete</mat-icon>
							</button>
						</td>
					</ng-container>

					<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
					<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
				</table>
			}
		</mat-card-content>
	</mat-card>
</section>
